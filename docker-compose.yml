version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:5173"
    environment:
      - VITE_API_PROXY=http://backend:8000
      - VITE_DEV_PORT=5173
    depends_on:
      - backend

  backend:
    build:
      context: ./backend-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend-api/data:/app/data
    environment:
      - NODE_ENV=development
      - TZ=Europe/Zurich
