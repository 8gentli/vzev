version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend-api/data:/app/data
    environment:
      - NODE_ENV=development
      - TZ=Europe/Zurich
